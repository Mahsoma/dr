<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المريض ولوحة تحكم الطبيب | عيادة القلب</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>نظام العناية المتكامل لمرضى القلب</h1>
        <p>مساحة رقمية آمنة وهادئة تربط بين المريض وطبيبه المعالج</p>
    </header>

    <main class="container">
        <!-- Patient Intake View Card -->
        <section class="card" aria-labelledby="patient-view-title">
            <h2 id="patient-view-title" class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                بوابة المريض (تسجيل الحالة)
            </h2>
            <form id="patientIntakeForm" novalidate>
                <div class="form-group">
                    <label for="fullName">الاسم الكامل</label>
                    <input type="text" id="fullName" class="form-control" placeholder="مثال: محمد عبد الله أحمد" required>
                </div>
                <div class="form-group">
                    <label for="age">العمر (سنوات)</label>
                    <input type="number" id="age" class="form-control" placeholder="مثال: 45" min="1" max="120" required>
                </div>
                <div class="form-group">
                    <label for="symptoms">المشاكل الصحية والأعراض الحالية</label>
                    <textarea id="symptoms" class="form-control" placeholder="يرجى وصف الأعراض بالتفصيل (مثل: ضيق في التنفس، ألم في الصدر، تسارع ضربات القلب...)" required></textarea>
                </div>
                <button type="submit" class="btn" id="submitBtn">
                    <span>إرسال البيانات إلى الطبيب</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </section>

        <!-- Doctor's Dashboard Card -->
        <section class="card" aria-labelledby="doctor-dashboard-title">
            <h2 id="doctor-dashboard-title" class="card-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                لوحة تحكم الطبيب (الحالات الواردة)
            </h2>
            
            <div id="casesList" class="cases-list">
                <div class="empty-state" id="emptyState">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 1rem; display: block; opacity: 0.5;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    لا توجد حالات واردة حالياً. بانتظار إرسال مريض لبياناته.
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
